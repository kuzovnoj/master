{% extends 'base.html' %}

{% block content %}
<h1>{{title}}</h1>
<form method="get">
    <p>
        <label>С: <input type="date" name="date_from" value="{{ date_from }}"></label>
        <label>По: <input type="date" name="date_to" value="{{ date_to }}"></label>
        <button type="submit">Показать</button>
    </p>
</form>
{% if total is not None %}
    <h2>Сумма дохода: {{ total }} руб.</h2>
{% endif %}
{% endblock %}
